services:
  coach:
    build: . # remove if deploying with the pre-built image
    image: luben93/cycling-coach:latest
    container_name: cycling-coach
    restart: unless-stopped
    # The container runs as a non-root user (uid 10001, set in the Dockerfile).
    # This is REQUIRED — the Claude CLI refuses headless operation as root.

    ports:
      # LAN-only. Bind to your server's LAN IP so it is NOT reachable from other
      # interfaces, e.g.  "192.168.1.10:8080:8080". The default below publishes on
      # all host interfaces — fine on a trusted LAN, but firewall port 8080 and
      # never port-forward it to the internet (there is no app-level auth).
      - ${COACH_BIND:-8080}:8080
    volumes:
      # All persistent + secret state lives here and is gitignored: the
      # subscription OAuth token, the Strava token, the coach's memory (the
      # athlete's private training journey), generated GPX routes, the snapshot.
      - coach:/data
    environment:
      # Strava OAuth app credentials (REST client + OAuth). Set in .env.
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      # Wahoo OAuth app credentials — same flow as Strava: connect once at
      # /api/wahoo/connect, tokens persist on the volume and auto-refresh.
      WAHOO_CLIENT_ID: ${WAHOO_CLIENT_ID:-}
      WAHOO_CLIENT_SECRET: ${WAHOO_CLIENT_SECRET:-}
      # Subscription OAuth token from `claude setup-token`
      # (or persist it at /data/claude-home/oauth_token on the volume).
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Public URL for OAuth redirects — must match the callback domains registered
      # in both the Strava and Wahoo app settings. Defaults to truenas.local:8080.
      COACH_PUBLIC_URL: ${COACH_PUBLIC_URL:-http://truenas.local:8080}
      COACH_SYNC_INTERVAL: ${COACH_SYNC_INTERVAL:-3600}
      COACH_MODEL: ${COACH_MODEL:-}
    # Live-reload for development: `docker compose watch`.
    # Inert during a normal `up` — only the `watch` command acts on this.
    # Pairs with docker-compose.override.yml (adds uvicorn --reload) so synced
    # code takes effect without a restart.
    develop:
      watch:
        # App + UI changes are copied straight into the running container.
        - action: sync
          path: ./app
          target: /srv/app
        - action: sync
          path: ./web
          target: /srv/web
        # Dependency or image changes require a rebuild.
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

    # Hardening for a published image.
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if
          urllib.request.urlopen('http://localhost:8080/api/health',timeout=5).status==200
          else 1)
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
networks: {}
volumes:
  coach: null
